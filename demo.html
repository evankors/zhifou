<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>演示流程｜知否</title>
    <style>
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Arial; background:#f5f6f7; color:#222; }
        .container { width: 960px; margin: 40px auto; background:#fff; border-radius:12px; padding:28px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        h1 { margin:0 0 16px; font-size:22px; }
        .section { margin-top:18px; }
        .step { background:#f8fafc; border:1px solid #eef0f4; border-radius:10px; padding:14px; margin-top:10px; }
        .title { font-weight:600; }
        .note { color:#6b7280; font-size:13px; margin-top:6px; }
    </style>
</head>
<body>
<style>
.global-nav-search {
    position: sticky;
    top: 0;
    z-index: 1200;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #eceff3;
}

.global-nav-search .inner {
    width: min(1120px, calc(100% - 40px));
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.global-nav-search .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    height: 36px;
    padding: 0 12px;
    border-radius: 18px;
    text-decoration: none;
    color: #1f2937;
    border: 1px solid #d8dde6;
    background: #fff;
    font-weight: 700;
    letter-spacing: .5px;
}

.global-nav-search form {
    display: flex;
    flex: 1;
    background: #fff;
    border: 1px solid #d8dde6;
    border-radius: 22px;
    overflow: hidden;
}

.global-nav-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 10px 14px;
    background: transparent;
}

.global-nav-search button {
    border: none;
    background: #3dbb7f;
    color: #fff;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
}

.global-nav-search .user-info {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #444;
}

.global-nav-search .user-info a {
    text-decoration: none;
    color: #2f9f6f;
}
</style>

<div class="global-nav-search">
    <div class="inner">
        <a class="logo" href="/">知否</a>
        <form method="get" action="/">
            <input name="q" value="" placeholder="搜索：理论 / 实验 / 老师 / 学院 / 论文">
            <button type="submit">搜索</button>
        </form>
        
    </div>
</div>
<div class="container">
    <h1>演示流程（1分钟内）</h1>

    <div class="section">
        <div class="title">学生侧</div>
        <div class="step">1. 注册/登录 → 2. 选专业/老师 → 3. 提问 → 4. 支付 → 5. 聊天收到回复</div>
        <div class="note">演示重点：转化路径清晰、支付后进入聊天闭环</div>
    </div>

    <div class="section">
        <div class="title">老师侧</div>
        <div class="step">1. 注册 → 2. 审核通过 → 3. 登录 → 4. 收到消息 → 5. 回复学生</div>
        <div class="note">演示重点：审核机制、消息入口、回复能力</div>
    </div>

    <div class="section">
        <div class="title">建议截图清单</div>
        <div class="step">首页、专业列表、老师列表、提问页、支付页、聊天页、老师注册、老师消息页</div>
    </div>
</div>
</body>
</html>
