        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;

        .container {
            width: 1100px;
            margin: 40px auto;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 26px;
        }

        .teacher-list {
            background: #fff;
            border-radius: 10px;
            padding: 10px 30px;
        }

        .teacher-item {
            display: flex;
            align-items: center;
            padding: 22px 0;
            border-bottom: 1px solid #eee;
        }

        .teacher-item:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 20px;
            object-fit: cover;
            background: #ddd;
        }

        .teacher-info {
            flex: 1;
        }

        .teacher-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .teacher-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .teacher-stats {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .teacher-stats span {
            margin-right: 14px;
        }

        .teacher-tags span {
            display: inline-block;
            font-size: 12px;
            color: #3dbb7f;
            border: 1px solid #3dbb7f;
            padding: 3px 10px;
            border-radius: 14px;
            margin-right: 6px;
            margin-top: 4px;
        }

        .teacher-action {
            text-align: right;
            min-width: 140px;
        }

        .teacher-price {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .ask-btn {
            border: 1px solid #3dbb7f;
            color: #3dbb7f;
            padding: 8px 18px;
            border-radius: 18px;
            cursor: pointer;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .ask-btn:hover {
            background: #3dbb7f;
            color: #fff;
        }
    </style>
</head>
