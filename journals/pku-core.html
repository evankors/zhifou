<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>北大核心期刊｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
            color: #222;
        }

        .container {
            width: 900px;
            margin: 56px auto;
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
        }

        .list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .item {
            background: #f8f9fb;
            border: 1px solid #eceff3;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
        }

        .back {
            margin-top: 24px;
            display: inline-block;
            text-decoration: none;
            color: #3dbb7f;
            border: 1px solid #3dbb7f;
            border-radius: 18px;
            padding: 8px 14px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<style>
.global-nav-search {
    position: sticky;
    top: 0;
    z-index: 1200;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #eceff3;
}

.global-nav-search .inner {
    width: min(1120px, calc(100% - 40px));
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.global-nav-search .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    height: 36px;
    padding: 0 12px;
    border-radius: 18px;
    text-decoration: none;
    color: #1f2937;
    border: 1px solid #d8dde6;
    background: #fff;
    font-weight: 700;
    letter-spacing: .5px;
}

.global-nav-search form {
    display: flex;
    flex: 1;
    background: #fff;
    border: 1px solid #d8dde6;
    border-radius: 22px;
    overflow: hidden;
}

.global-nav-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 10px 14px;
    background: transparent;
}

.global-nav-search button {
    border: none;
    background: #3dbb7f;
    color: #fff;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
}

.global-nav-search .user-info {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #444;
}

.global-nav-search .user-info a {
    text-decoration: none;
    color: #2f9f6f;
}
</style>

<div class="global-nav-search">
    <div class="inner">
        <a class="logo" href="/">知否</a>
        <form method="get" action="/">
            <input name="q" value="" placeholder="搜索：理论 / 实验 / 老师 / 学院 / 论文">
            <button type="submit">搜索</button>
        </form>
        
    </div>
</div>
<div class="container">
    <h1>北大核心期刊</h1>
    <div class="subtitle">中文核心期刊要目总览（示例）</div>
    <div class="list">
        
            <div class="item">1. 管理评论</div>
        
            <div class="item">2. 经济管理</div>
        
            <div class="item">3. 预测</div>
        
            <div class="item">4. 软科学</div>
        
            <div class="item">5. 科学学与科学技术管理</div>
        
            <div class="item">6. 现代财经</div>
        
    </div>
    <a class="back" href="/">返回首页</a>
</div>
</body>
</html>
