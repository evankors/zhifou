<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>老师详情｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
            color: #333;
        }

        .container {
            width: 900px;
            margin: 30px auto 120px;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            width: 88px;
            height: 88px;
        }

        .avatar-wrap img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            background: #e5e7eb;
        }

        .badge {
            position: absolute;
            right: -2px;
            bottom: -2px;
            background: #3dbb7f;
            color: #fff;
            font-size: 12px;
            width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        .name {
            font-size: 26px;
            font-weight: 600;
        }

        .title {
            margin-top: 6px;
            color: #666;
        }

        .price {
            color: #ff5a5f;
            font-size: 18px;
            font-weight: 600;
        }

        .section {
            margin-top: 26px;
        }

        .ask-bar {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background: linear-gradient(135deg, #3fd29a, #2bb673);
            padding: 16px 0;
        }

        .ask-btn {
            width: 300px;
            margin: 0 auto;
            background: #fff;
            color: #2bb673;
            border-radius: 28px;
            text-align: center;
            font-size: 16px;
            padding: 12px 0;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>
<style>
.global-nav-search {
    position: sticky;
    top: 0;
    z-index: 1200;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #eceff3;
}

.global-nav-search .inner {
    width: min(1120px, calc(100% - 40px));
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.global-nav-search .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    height: 36px;
    padding: 0 12px;
    border-radius: 18px;
    text-decoration: none;
    color: #1f2937;
    border: 1px solid #d8dde6;
    background: #fff;
    font-weight: 700;
    letter-spacing: .5px;
}

.global-nav-search form {
    display: flex;
    flex: 1;
    background: #fff;
    border: 1px solid #d8dde6;
    border-radius: 22px;
    overflow: hidden;
}

.global-nav-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 10px 14px;
    background: transparent;
}

.global-nav-search button {
    border: none;
    background: #3dbb7f;
    color: #fff;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
}

.global-nav-search .user-info {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #444;
}

.global-nav-search .user-info a {
    text-decoration: none;
    color: #2f9f6f;
}
</style>

<div class="global-nav-search">
    <div class="inner">
        <a class="logo" href="/">知否</a>
        <form method="get" action="/">
            <input name="q" value="" placeholder="搜索：理论 / 实验 / 老师 / 学院 / 论文">
            <button type="submit">搜索</button>
        </form>
        
    </div>
</div>

<div class="container">
    <div class="header">
        <div style="display:flex;gap:16px;align-items:center;">
            <div class="avatar-wrap">
                <img src="/static/uploads/teachers/29/avatar.svg" alt="头像">
                
            </div>
            <div>
                <div class="name">孙晴</div>
                <div class="title">中南大学 · 副教授</div>
                <div class="title">教育学</div>
            </div>
        </div>
        <div class="price">¥89</div>
    </div>

    <div class="section">
        <strong>审核状态：</strong>approved
    </div>
</div>

<div class="ask-bar">
    <a class="ask-btn" href="/ask?teacher_id=29">向老师提问 ￥89</a>
</div>

</body>
</html>
