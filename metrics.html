<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>关键指标｜知否</title>
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --bg: #f6f8fb;
            --accent: #16a34a;
            --accent-2: #0ea5e9;
            --accent-3: #f59e0b;
        }
        body {
            margin: 0;
            font-family: "IBM Plex Sans", "Avenir Next", "Helvetica Neue", sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, #eef2ff, var(--bg));
            color: var(--ink);
        }
        .page {
            width: 1080px;
            margin: 36px auto 64px;
        }
        .hero {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .hero h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: .6px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 6px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .metric {
            background: var(--card);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid #eef2f7;
        }
        .metric .label {
            color: var(--muted);
            font-size: 12px;
        }
        .metric .value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 8px;
        }
        .metric .trend {
            font-size: 12px;
            margin-top: 8px;
            color: var(--accent);
        }
        .section {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px;
            border: 1px solid #eef2f7;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        }
        .card h2 {
            margin: 0 0 14px;
            font-size: 16px;
        }
        .bars {
            display: grid;
            gap: 10px;
        }
        .bar-row {
            display: grid;
            grid-template-columns: 110px 1fr 48px;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
        }
        .bar {
            height: 10px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }
        .bar span {
            display: block;
            height: 100%;
            border-radius: 999px;
        }
        .bar .a { background: var(--accent); }
        .bar .b { background: var(--accent-2); }
        .bar .c { background: var(--accent-3); }
        .small-list {
            margin: 0;
            padding-left: 18px;
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<style>
.global-nav-search {
    position: sticky;
    top: 0;
    z-index: 1200;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #eceff3;
}

.global-nav-search .inner {
    width: min(1120px, calc(100% - 40px));
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.global-nav-search .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    height: 36px;
    padding: 0 12px;
    border-radius: 18px;
    text-decoration: none;
    color: #1f2937;
    border: 1px solid #d8dde6;
    background: #fff;
    font-weight: 700;
    letter-spacing: .5px;
}

.global-nav-search form {
    display: flex;
    flex: 1;
    background: #fff;
    border: 1px solid #d8dde6;
    border-radius: 22px;
    overflow: hidden;
}

.global-nav-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 10px 14px;
    background: transparent;
}

.global-nav-search button {
    border: none;
    background: #3dbb7f;
    color: #fff;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
}

.global-nav-search .user-info {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #444;
}

.global-nav-search .user-info a {
    text-decoration: none;
    color: #2f9f6f;
}
</style>

<div class="global-nav-search">
    <div class="inner">
        <a class="logo" href="/">知否</a>
        <form method="get" action="/">
            <input name="q" value="" placeholder="搜索：理论 / 实验 / 老师 / 学院 / 论文">
            <button type="submit">搜索</button>
        </form>
        
    </div>
</div>
<div class="page">
    <div class="hero">
        <div>
            <h1>关键指标看板</h1>
            <div class="subtitle">示例数据用于路演展示，可替换为真实运营数据</div>
        </div>
        <div class="subtitle">最近更新：今日 12:00</div>
    </div>

    <div class="grid">
        <div class="metric">
            <div class="label">今日新增用户</div>
            <div class="value">128</div>
            <div class="trend">▲ 18% vs 昨日</div>
        </div>
        <div class="metric">
            <div class="label">今日提问数</div>
            <div class="value">76</div>
            <div class="trend">▲ 12% vs 昨日</div>
        </div>
        <div class="metric">
            <div class="label">付费转化率</div>
            <div class="value">18.5%</div>
            <div class="trend">▲ 2.1pt</div>
        </div>
        <div class="metric">
            <div class="label">平均响应时间</div>
            <div class="value">2.4h</div>
            <div class="trend">▼ 0.6h</div>
        </div>
    </div>

    <div class="section">
        <div class="card">
            <h2>专业热度分布</h2>
            <div class="bars">
                <div class="bar-row"><div>管理学</div><div class="bar"><span class="a" style="width:78%"></span></div><div>78%</div></div>
                <div class="bar-row"><div>心理学</div><div class="bar"><span class="b" style="width:56%"></span></div><div>56%</div></div>
                <div class="bar-row"><div>计算机</div><div class="bar"><span class="c" style="width:49%"></span></div><div>49%</div></div>
                <div class="bar-row"><div>教育学</div><div class="bar"><span class="a" style="width:42%"></span></div><div>42%</div></div>
                <div class="bar-row"><div>经济学</div><div class="bar"><span class="b" style="width:38%"></span></div><div>38%</div></div>
            </div>
        </div>
        <div class="card">
            <h2>增长亮点</h2>
            <ul class="small-list">
                <li>老师审核通过率 82%</li>
                <li>复购率 21%</li>
                <li>高峰期响应 < 1 小时</li>
                <li>高价值用户占比 14%</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
