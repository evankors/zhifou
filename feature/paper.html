<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>查论文｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
            color: #333;
        }

        .container {
            width: 900px;
            margin: 80px auto;
            background: #fff;
            border-radius: 10px;
            padding: 36px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
        }

        h1 {
            margin: 0;
            font-size: 30px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 16px;
            color: #666;
        }

        .desc {
            margin-top: 22px;
            line-height: 1.8;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid #3dbb7f;
            color: #3dbb7f;
            font-size: 14px;
        }

        .btn.primary {
            background: #3dbb7f;
            color: #fff;
        }

        .section-title {
            margin-top: 28px;
            margin-bottom: 12px;
            font-size: 20px;
        }

        .theory-list {
            display: grid;
            gap: 12px;
        }

        .theory-item {
            border: 1px solid #e6e9ef;
            border-radius: 8px;
            background: #fafbfc;
            padding: 14px 16px;
        }

        .theory-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .theory-text {
            font-size: 14px;
            line-height: 1.7;
            color: #444;
        }

        .theory-tags {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .theory-tag {
            font-size: 12px;
            color: #2f9f6f;
            background: #eaf6f1;
            border-radius: 14px;
            padding: 4px 10px;
        }
    </style>
</head>
<body>
<style>
.global-nav-search {
    position: sticky;
    top: 0;
    z-index: 1200;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #eceff3;
}

.global-nav-search .inner {
    width: min(1120px, calc(100% - 40px));
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.global-nav-search .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    height: 36px;
    padding: 0 12px;
    border-radius: 18px;
    text-decoration: none;
    color: #1f2937;
    border: 1px solid #d8dde6;
    background: #fff;
    font-weight: 700;
    letter-spacing: .5px;
}

.global-nav-search form {
    display: flex;
    flex: 1;
    background: #fff;
    border: 1px solid #d8dde6;
    border-radius: 22px;
    overflow: hidden;
}

.global-nav-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 10px 14px;
    background: transparent;
}

.global-nav-search button {
    border: none;
    background: #3dbb7f;
    color: #fff;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
}

.global-nav-search .user-info {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #444;
}

.global-nav-search .user-info a {
    text-decoration: none;
    color: #2f9f6f;
}
</style>

<div class="global-nav-search">
    <div class="inner">
        <a class="logo" href="/">知否</a>
        <form method="get" action="/">
            <input name="q" value="" placeholder="搜索：理论 / 实验 / 老师 / 学院 / 论文">
            <button type="submit">搜索</button>
        </form>
        
    </div>
</div>

<div class="container">
    <h1>查论文</h1>
    <div class="subtitle">论文结构与投稿</div>
    <div class="desc">在这里查看论文结构模板、投稿流程与审稿应对建议。</div>

    

    <div class="actions">
        <a class="btn primary" href="/ask-subject">去问老师</a>
        <a class="btn" href="/">返回首页</a>
    </div>
</div>

</body>
</html>
